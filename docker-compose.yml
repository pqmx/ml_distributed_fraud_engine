# =============================================================================
# docker-compose.yml — full local stack
# =============================================================================
# Brings up: zookeeper, kafka, redis, postgres, ml-server, fraud-engine,
# prometheus, grafana.
#
# Topology:
#   producer.py  →  kafka:transactions  →  fraud-engine  →  redis (enrich)
#                                                       →  ml-server (gRPC)
#                                                       →  kafka:clean | kafka:fraud-dlq
#                                                       →  postgres (audit log)
#                                                       →  prometheus (metrics)
#
# To run:    docker compose up --build
# To tear:   docker compose down -v
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Kafka stack (Confluent images — well-maintained, sane defaults)
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: fraud-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: fraud-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: PLAINTEXT for in-cluster, PLAINTEXT_HOST for host machine.
      # Without this the producer.py running on the host can't reach the broker.
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # 3 partitions on the transactions topic — gives our consumer 3-way
      # parallelism out of the box. In prod we'd size this for peak QPS / per-partition throughput.
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # Redis (feature store)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: fraud-redis
    ports:
      - "6379:6379"
    # appendonly off — we treat Redis as an L1 cache, source of truth is Postgres.
    # In prod we might enable AOF for faster warm-up after restart.
    command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Postgres (audit log for flagged transactions)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: fraud-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       fraud
      POSTGRES_USER:     fraud
      POSTGRES_PASSWORD: fraud
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud"]
      interval: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # ML server (Python + FastAPI + gRPC)
  # ---------------------------------------------------------------------------
  ml-server:
    build:
      context: .
      dockerfile: ml_server/Dockerfile
    container_name: fraud-ml-server
    ports:
      - "50051:50051"   # gRPC
      - "8000:8000"     # FastAPI health/debug
    environment:
      MODEL_PATH: /app/model/xgb_model.joblib
      GRPC_PORT:  50051
      HTTP_PORT:  8000
    volumes:
      - ./ml_server/model:/app/model:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # The C++ service — the whole reason we're here
  # ---------------------------------------------------------------------------
  fraud-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-engine
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ml-server:
        condition: service_healthy
    ports:
      - "9091:9090"   # prometheus metrics endpoint (host:container)
    environment:
      KAFKA_BROKERS:        kafka:29092
      KAFKA_INPUT_TOPIC:    transactions
      KAFKA_CLEAN_TOPIC:    clean-transactions
      KAFKA_DLQ_TOPIC:      fraud-dlq
      KAFKA_GROUP_ID:       fraud-engine
      REDIS_HOST:           redis
      REDIS_PORT:           "6379"
      REDIS_POOL_SIZE:      "8"
      ML_GRPC_ADDRESS:      ml-server:50051
      ML_TIMEOUT_MS:        "10"
      POSTGRES_DSN:         "postgresql://fraud:fraud@postgres:5432/fraud"
      THREAD_POOL_SIZE:     "8"
      MAX_QUEUE_SIZE:       "10000"
      FRAUD_THRESHOLD:      "0.85"
      CIRCUIT_FAILURE_THRESHOLD: "5"
      CIRCUIT_RECOVERY_SEC: "30"
      LOG_LEVEL:            info
      PROMETHEUS_PORT:      "9090"

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: fraud-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=24h"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: fraud-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED:  "true"
    volumes:
      - ./infra/monitoring/grafana_dashboard.json:/var/lib/grafana/dashboards/fraud.json:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres-data:
  grafana-data:
