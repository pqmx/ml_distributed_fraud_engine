# =============================================================================
# infra/monitoring/prometheus.yml
# =============================================================================
# Scrape config for the fraud detection engine.
# scrape_interval is short (2s) because we want sub-minute resolution on
# our SLO graphs during load tests.
# =============================================================================

global:
  scrape_interval:     2s
  evaluation_interval: 5s

  external_labels:
    monitor: fraud-detection-engine

scrape_configs:

  # The C++ engine's prometheus-cpp exposer.
  - job_name: fraud-engine
    metrics_path: /metrics
    static_configs:
      - targets: ["fraud-engine:9090"]
        labels:
          service: fraud-engine

  # Self-scrape — useful for sanity checks ("is Prometheus alive at all?").
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
